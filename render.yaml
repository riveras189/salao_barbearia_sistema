services:
  - type: web
    name: salao-rf-sistema
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm ci && npm run db:generate && npm run db:push && npm run build
    startCommand: npm run start
    healthCheckPath: /
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_MODEL_SWITCH
        value: "true"
      - key: ENABLE_SYSTEM_MODEL_API
        value: "true"
